name: CI Failure Alert

# Watches ALL workflow runs on main/develop and creates a GitHub issue on failure.
# Auto-closes when CI passes again. Works on free GitHub plans (private + public repos).

on:
  workflow_run:
    types: [completed]
    branches: [main, develop, master]

permissions:
  issues: write

jobs:
  alert-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'CI Failure Alert' }}

    steps:
      - name: Create or update CI failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const title = `🚨 CI failing on \`${branch}\``;
            const runUrl = context.payload.workflow_run.html_url;
            const commit = context.payload.workflow_run.head_sha.substring(0, 7);
            const workflowName = context.payload.workflow_run.name;

            const body = [
              `## CI Pipeline Failed`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Workflow | ${workflowName} |`,
              `| Branch | \`${branch}\` |`,
              `| Commit | \`${commit}\` |`,
              `| Run | [View logs](${runUrl}) |`,
              `| Time | ${new Date().toISOString()} |`,
              ``,
              `**Action needed:** Check the failing step in the run logs and fix before merging further.`,
              ``,
              `_Auto-created by CI Failure Alert. Will auto-close when CI passes._`,
            ].join('\n');

            // Check for existing open CI failure issue for this branch
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 10,
            });

            const branchIssue = existingIssues.find(i => i.title.includes(branch));

            if (branchIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: branchIssue.number,
                body: `Still failing — **${workflowName}** on commit \`${commit}\` ([logs](${runUrl}))`,
              });
            } else {
              // Ensure label exists
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'ci-failure' });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'ci-failure', color: 'B60205', description: 'CI pipeline failure' });
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }

  close-on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name != 'CI Failure Alert' }}

    steps:
      - name: Auto-close CI failure issues for this branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 10,
            });

            for (const issue of openIssues) {
              if (issue.title.includes(branch)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ CI is green again on \`${branch}\`. Auto-closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
